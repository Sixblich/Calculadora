<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora JS</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #046852;
      --panel: #162324;
      --card: #1c1c26;
      --border: #2a2a3a;
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --green: #34d399;
      --red: #f87171;
      --amber: #fbbf24;
      --text: #f0eeff;
      --muted: #7a7a9a;
      --display-bg: #050507;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(124,92,252,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.06) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.35rem;
    }

    .wrapper {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 640px) {
      .wrapper { grid-template-columns: 1fr; }
    }

    .calc-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-family: 'Space Mono', monospace;
    }

    .display .expr {
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2rem;
      text-align: right;
      word-break: break-all;
    }

    .display .result {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      text-align: right;
      color: var(--text);
      word-break: break-all;
      transition: color 0.2s;
    }

    .display .result.error { color: var(--red); font-size: 1rem; }

    .num-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      height: 52px;
      transition: transform 0.1s, background 0.15s;
      outline: none;
    }

    button:active { transform: scale(0.94); }

    .btn-num {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-num:hover { background: #252535; }

    .btn-op {
      background: rgba(124,92,252,0.15);
      color: var(--accent2);
      border: 1px solid rgba(124,92,252,0.3);
    }
    .btn-op:hover { background: rgba(124,92,252,0.28); }

    .btn-eq {
      background: var(--accent);
      color: #fff;
      border: none;
      grid-column: span 2;
    }
    .btn-eq:hover { background: #6b4de0; }

    .btn-clear {
      background: rgba(248,113,113,0.12);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.3);
    }
    .btn-clear:hover { background: rgba(248,113,113,0.22); }

    .btn-back {
      background: rgba(251,191,36,0.1);
      color: var(--amber);
      border: 1px solid rgba(251,191,36,0.25);
    }
    .btn-back:hover { background: rgba(251,191,36,0.2); }

    .btn-dot {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .ops-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .op-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
    }

    .op-block h3 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 0.75rem;
    }

    .op-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .op-row input[type="number"] {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.55rem 0.8rem;
      width: 90px;
      outline: none;
      transition: border-color 0.2s;
    }

    .op-row input[type="number"]:focus { border-color: var(--accent); }

    .op-row span {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      color: var(--muted);
    }

    .btn-small {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      height: auto;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.5px;
    }
    .btn-small:hover { background: #6b4de0; }

    .op-result {
      margin-top: 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green);
      min-height: 1.5rem;
      word-break: break-all;
    }

    .op-result.error { color: var(--red); font-size: 0.85rem; font-weight: 400; }

    .footer-link {
      margin-top: 1.8rem;
      text-align: center;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent2);
      border-radius: 50px;
      padding: 0.65rem 1.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      height: auto;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-nav:hover { background: rgba(124,92,252,0.15); }
    .btn-nav:active { transform: scale(0.97); }

    .badge {
      display: inline-block;
      background: rgba(124,92,252,0.18);
      color: var(--accent2);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 0.6rem;
    }
  </style>
</head>
<body>

<header>
  <div class="badge">Tema 3.1 – Scripting con JavaScript</div>
  <h1>Calculadora Básica</h1>
  <p>Operaciones aritméticas, potencia y factorial</p>
</header>

<div class="wrapper">

  <!-- CALCULADORA ESTÁNDAR -->
  <div class="calc-panel">
    <span class="section-label">Calculadora</span>
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="display">0</div>
    </div>
    <div class="num-grid">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-back" onclick="backspace()">⌫</button>
      <button class="btn-op" onclick="appendOp('%')">%</button>
      <button class="btn-op" onclick="appendOp('/')">÷</button>

      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="appendOp('*')">×</button>

      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="appendOp('-')">−</button>

      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="appendOp('+')">+</button>

      <button class="btn-num" onclick="appendNum('0')" style="grid-column:span 2">0</button>
      <button class="btn-dot" onclick="appendDot()">.</button>
      <button class="btn-eq" onclick="calculate()" style="grid-column:span 1">=</button>
    </div>
  </div>

  <!-- OPERACIONES ESPECIALES -->
  <div class="ops-panel">
    <span class="section-label">Operaciones especiales</span>

    <!-- Potencia -->
    <div class="op-block">
      <h3>⚡ Potencia &nbsp; aⁿ</h3>
      <div class="op-row">
        <input type="number" id="pow-base" placeholder="base" value="2">
        <span>^</span>
        <input type="number" id="pow-exp" placeholder="exp" value="10">
        <button class="btn-small" onclick="calcPow()">Calcular</button>
      </div>
      <div class="op-result" id="pow-result"></div>
    </div>

    <!-- Factorial -->
    <div class="op-block">
      <h3>🔢 Factorial &nbsp; n!</h3>
      <div class="op-row">
        <input type="number" id="fact-n" placeholder="n" value="5" min="0" max="170">
        <span>!</span>
        <button class="btn-small" onclick="calcFact()">Calcular</button>
      </div>
      <div class="op-result" id="fact-result"></div>
    </div>

    <!-- División con resto -->
    <div class="op-block">
      <h3>➗ División exacta</h3>
      <div class="op-row">
        <input type="number" id="div-a" placeholder="dividendo" value="17">
        <span>÷</span>
        <input type="number" id="div-b" placeholder="divisor" value="5">
        <button class="btn-small" onclick="calcDiv()">Calcular</button>
      </div>
      <div class="op-result" id="div-result"></div>
    </div>

    <!-- Historial -->
    <div>
      <span class="section-label">Historial</span>
      <div id="history" style="margin-top:0.5rem; display:flex; flex-direction:column; gap:4px; max-height:120px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<!-- BOTÓN NAVEGACIÓN -->
<div class="footer-link">
  <a href="edad.html" class="btn-nav">
    📅 Calcular edad por fecha de nacimiento →
  </a>
</div>

<script>
  let expr = '';
  let justEvaluated = false;

  function updateDisplay(val, exprText) {
    const d = document.getElementById('display');
    d.textContent = val;
    d.className = 'result' + (typeof val === 'string' && val.startsWith('Error') ? ' error' : '');
    document.getElementById('expr').textContent = exprText || '';
  }

  function appendNum(n) {
    if (justEvaluated) { expr = ''; justEvaluated = false; }
    expr += n;
    updateDisplay(expr);
  }

  function appendOp(op) {
    justEvaluated = false;
    if (expr === '' && op !== '-') return;
    const last = expr.slice(-1);
    if (['+','-','*','/','%'].includes(last)) expr = expr.slice(0,-1);
    expr += op;
    updateDisplay(expr);
  }

  function appendDot() {
    if (justEvaluated) { expr = '0'; justEvaluated = false; }
    const parts = expr.split(/[\+\-\*\/]/);
    const cur = parts[parts.length-1];
    if (cur.includes('.')) return;
    if (cur === '') expr += '0';
    expr += '.';
    updateDisplay(expr);
  }

  function backspace() {
    if (justEvaluated) { clearAll(); return; }
    expr = expr.slice(0,-1);
    updateDisplay(expr || '0');
  }

  function clearAll() {
    expr = '';
    justEvaluated = false;
    updateDisplay('0', '');
  }

  function addHistory(entry) {
    const h = document.getElementById('history');
    const el = document.createElement('div');
    el.style.cssText = 'font-family:Space Mono,monospace;font-size:0.72rem;color:#7a7a9a;text-align:right;padding:2px 4px;';
    el.textContent = entry;
    h.prepend(el);
    if (h.children.length > 8) h.removeChild(h.lastChild);
  }

  function calculate() {
    if (!expr) return;
    try {
      const safe = expr.replace(/[^0-9+\-*/.%()\s]/g,'');
      const res = Function('"use strict"; return (' + safe + ')')();
      if (!isFinite(res)) { updateDisplay('Error: ÷ 0', expr); expr = ''; return; }
      const disp = parseFloat(res.toFixed(10)).toString();
      addHistory(expr + ' = ' + disp);
      updateDisplay(disp, expr + ' =');
      expr = disp;
      justEvaluated = true;
    } catch(e) {
      updateDisplay('Error de sintaxis', expr);
      expr = '';
    }
  }

  function calcPow() {
    const base = parseFloat(document.getElementById('pow-base').value);
    const exp  = parseFloat(document.getElementById('pow-exp').value);
    const r    = document.getElementById('pow-result');
    if (isNaN(base) || isNaN(exp)) { r.className='op-result error'; r.textContent='Ingresa valores válidos'; return; }
    const res = Math.pow(base, exp);
    r.className = 'op-result';
    r.textContent = base + ' ^ ' + exp + ' = ' + parseFloat(res.toFixed(10));
    addHistory(base + '^' + exp + ' = ' + parseFloat(res.toFixed(10)));
  }

  function calcFact() {
    const n = parseInt(document.getElementById('fact-n').value);
    const r = document.getElementById('fact-result');
    if (isNaN(n) || n < 0) { r.className='op-result error'; r.textContent='Ingresa un entero ≥ 0'; return; }
    if (n > 170)            { r.className='op-result error'; r.textContent='Número demasiado grande (máx 170)'; return; }
    let f = BigInt(1);
    for (let i = 2; i <= n; i++) f *= BigInt(i);
    r.className = 'op-result';
    const str = f.toString();
    r.textContent = n + '! = ' + (str.length > 25 ? str.slice(0,25) + '…' : str);
    addHistory(n + '! = ' + str);
  }

  function calcDiv() {
    const a = parseFloat(document.getElementById('div-a').value);
    const b = parseFloat(document.getElementById('div-b').value);
    const r = document.getElementById('div-result');
    if (isNaN(a) || isNaN(b)) { r.className='op-result error'; r.textContent='Ingresa valores válidos'; return; }
    if (b === 0)               { r.className='op-result error'; r.textContent='No se puede dividir entre 0'; return; }
    const q = Math.trunc(a / b);
    const rem = a % b;
    r.className = 'op-result';
    r.textContent = a + ' ÷ ' + b + ' = ' + parseFloat((a/b).toFixed(10)) + '  (cociente ' + q + ', resto ' + parseFloat(rem.toFixed(10)) + ')';
    addHistory(a + ' ÷ ' + b + ' = ' + parseFloat((a/b).toFixed(10)));
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === '%') appendOp('%');
    else if (e.key === '.') appendDot();
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
